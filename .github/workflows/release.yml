name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*" # plain semver tags, no leading "v" (must match manifest.json version)

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Fail loudly if the tag does not match the manifest version.
          manifest_version=$(grep -oP '"version"\s*:\s*"\K[^"]+' manifest.json | head -1)
          if [ "$TAG" != "$manifest_version" ]; then
            echo "Tag '$TAG' does not match manifest.json version '$manifest_version'." >&2
            exit 1
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
